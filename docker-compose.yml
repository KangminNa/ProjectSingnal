version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: projectsignal-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: projectsignal
      POSTGRES_PASSWORD: projectsignal_dev
      POSTGRES_DB: projectsignal
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U projectsignal']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: projectsignal-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    container_name: projectsignal-nats
    restart: unless-stopped
    ports:
      - '4222:4222'
      - '8222:8222'
    command: --config /etc/nats/nats-server.conf
    volumes:
      - ./docker/nats/nats-server.conf:/etc/nats/nats-server.conf
      - natsdata:/data
    healthcheck:
      test: ['CMD', 'nats-server', '--signal', 'ldm']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
  natsdata:
